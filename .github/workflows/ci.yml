name: CI / CD

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  REGION: us-east1
  REPOSITORY: ag-shop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies and build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.affordable-gadgetske.com
          NEXT_PUBLIC_BRAND_CODE: AFFORDABLE_GADGETS
          NEXT_PUBLIC_BRAND_NAME: Affordable Gadgets KE
        run: |
          npm ci
          npm install --no-save \
            lightningcss-linux-x64-gnu@1.30.2 \
            @tailwindcss/oxide-linux-x64-gnu@4.1.16
          npm run build

      - name: Docker build
        run: docker build -t ag-shop:ci .

  push-and-deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push to Artifact Registry
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          NEXT_PUBLIC_API_BASE_URL: https://api.affordable-gadgetske.com
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.REPOSITORY }}/ag-shop"
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL}" \
            --build-arg NEXT_PUBLIC_BRAND_CODE=AFFORDABLE_GADGETS \
            --build-arg NEXT_PUBLIC_BRAND_NAME="Affordable Gadgets KE" \
            -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:production-latest" .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:production-latest"

      - name: Rolling update production shop MIG
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MIG_NAME: ${{ secrets.PRODUCTION_SHOP_MIG_NAME }}
        run: |
          gcloud compute instance-groups managed rolling-action replace "${MIG_NAME}" \
            --region=${{ env.REGION }} --project="${PROJECT_ID}" --max-unavailable=0 --max-surge=0
