name: Deploy shop production (manual fallback)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Git SHA already in Artifact Registry (default: production-latest)'
        required: false
        default: 'production-latest'

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Deploy shop MIG (recreate + pull images)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: us-east1
          MIG_NAME: ${{ secrets.PRODUCTION_SHOP_MIG_NAME }}
          SERVICE: shop
          DEPLOY_CONFIG_BUCKET: ${{ secrets.DEPLOY_CONFIG_BUCKET }}
          ENV_NAME: production
        run: bash scripts/mig-recreate-deploy.sh
