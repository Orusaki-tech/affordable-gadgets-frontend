name: Deploy shop production (manual fallback)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Git SHA already in Artifact Registry (default: production-latest)
        required: false
        default: production-latest

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Rolling update shop MIG
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          MIG_NAME: ${{ secrets.PRODUCTION_SHOP_MIG_NAME }}
        run: |
          gcloud compute instance-groups managed rolling-action replace "${MIG_NAME}" \
            --region=us-east1 --project="${PROJECT_ID}" --max-unavailable=0 --max-surge=1
