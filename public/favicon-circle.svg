<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Affordable Gadgets favicon">
  <defs>
    <clipPath id="clip">
      <circle cx="32" cy="32" r="30" />
    </clipPath>
  </defs>

  <!-- Transparent background; draw within a circle -->
  <g clip-path="url(#clip)">
    <!-- Outer ring -->
    <circle cx="32" cy="32" r="28" fill="none" stroke="#111827" stroke-width="4" />

    <!-- Simple phone glyph -->
    <rect x="24" y="14" width="16" height="36" rx="3.5" fill="none" stroke="#111827" stroke-width="3" />
    <rect x="27.5" y="18" width="9" height="25" rx="1.5" fill="#111827" opacity="0.04" />
    <circle cx="32" cy="46.5" r="1.6" fill="#111827" />
  </g>
</svg>
